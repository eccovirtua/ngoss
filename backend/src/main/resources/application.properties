spring.application.name=demo

## Esto configurará la base de datos H2 en memoria y activará la consola web
## para ver tablas desde el navegador

# Conexión a la base de datos H2 en memoria
spring.datasource.url=jdbc:h2:file:./data/keyvaultdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Activar la consola web de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuración de JPA / Hibernate para que cree las tablas automáticamente
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true